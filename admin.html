<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約カレンダー管理 - 鮨処ひし田</title>
  <link rel="stylesheet" href="admin.css">
</head>

<<!-- 予約編集モーダル -->
<!-- 背景暗転（スクロールなし） -->
<div id="edit-overlay" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  z-index:9998;
"></div>

<!-- モーダル（スクロールはこちら） -->
<div id="edit-modal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:9999;
  overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
">
  <div style="
    background:#1a1a1a;
    border:1px solid #c8a882;
    border-radius:12px;
    padding:24px 20px;
    width:calc(100% - 40px);
    max-width:440px;
    margin:80px auto 60px;
    box-sizing:border-box;
    position:relative;
    z-index:10000;
  ">
    <h3 style="color:#c8a882; margin:0 0 16px;">予約内容の編集</h3>
    <div id="edit-fields"></div>
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button id="edit-save-btn" style="flex:1; background:#c8a882; color:#111; border:none; padding:14px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:1rem;">保存</button>
      <button id="edit-close-btn" style="flex:1; background:#444; color:#fff; border:none; padding:14px; border-radius:6px; cursor:pointer; font-size:1rem;">閉じる</button>
    </div>
  </div>
</div>







<body>

    <!-- ローディングオーバーレイ（通信中に表示） -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- ヘッダー -->
    <header>
        <nav>
            <div class="logo">鮨処ひし田</div>
            <span class="admin-label"></span>
            <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('calendar')">予約カレンダー管理</button>
            <button class="tab-btn" onclick="switchTab('reservations')">予約一覧</button>
            <button class="tab-btn" id="admin-refresh-btn" onclick="loadData()">更新</button>
</div>
        </nav>
    </header>

    <!-- メインコンテンツ -->
    <main class="admin-container">

        <!-- カレンダー管理（tab-calendarで囲む） -->
        <div id="tab-calendar">

        <!-- ぐるぐる -->
        <div id="calendar-loading" style="display:flex; justify-content:center; padding:40px;">
            <div class="spinner"></div>
        </div>

        <!-- ↓ calendar-wrap で囲んで最初は非表示に！ -->
        <div id="calendar-wrap" style="display:none;">
            <div id="month-label" class="month-label"></div>
            <div class="calendar" id="calendar">
            <div class="day-header">日</div>
            <div class="day-header">月</div>
            <div class="day-header">火</div>
            <div class="day-header">水</div>
            <div class="day-header">木</div>
            <div class="day-header">金</div>
            <div class="day-header">土</div>
            </div>
        </div>

        <!-- 個室ブロック管理 -->
        <div id="private-room-block" style="
            margin-top: 24px;
            background: #1a1a1a;
            border: 1px solid #c8a882;
            border-radius: 8px;
            padding: 20px 20px 16px;
        ">
            <h3 style="color:#c8a882; margin:0 0 14px; font-size:1rem; letter-spacing:0.05em;">個室の受付管理</h3>
            <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
                <div>
                    <label style="color:#ddd; font-size:0.82rem; display:block; margin-bottom:4px;">対象日を選択</label>
                    <input type="date" id="block-date" style="
                        padding:9px 10px;
                        background:#2a2a2a;
                        color:#fff;
                        border:1px solid #555;
                        border-radius:6px;
                        font-size:0.95rem;
                        -webkit-appearance:none;
                        appearance:none;
                        height:40px;
                    ">
                </div>
                <button onclick="blockPrivateRoom()" style="
                    background:#8b2020;
                    color:#fff;
                    border:none;
                    padding:0 18px;
                    height:40px;
                    border-radius:6px;
                    cursor:pointer;
                    font-size:0.88rem;
                    white-space:nowrap;
                ">個室を受付不可にする</button>
                <button onclick="unblockPrivateRoom()" style="
                    background:#1f5c1f;
                    color:#fff;
                    border:none;
                    padding:0 18px;
                    height:40px;
                    border-radius:6px;
                    cursor:pointer;
                    font-size:0.88rem;
                    white-space:nowrap;
                ">受付不可を解除する</button>
            </div>
            <div id="block-result" style="margin-top:12px; font-size:0.85rem; color:#aaa; min-height:1.2em;"></div>
        </div>

        </div>

        <!-- 予約一覧 -->
        <div id="tab-reservations" style="display:none;">
            <h2>予約一覧</h2>
            <div id="reservation-list">読み込み中...</div>
        </div>

</main>


    <!-- ステータス変更モーダル -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 id="modal-date"></h2>
            <p class="modal-sub">予約状況を選択してください</p>
            <div class="modal-buttons">
                <button class="modal-btn btn-○" onclick="update('○')">○ 空席あり</button>
                <button class="modal-btn btn-△" onclick="update('△')">△ 残りわずか</button>
                <button class="modal-btn btn-×" onclick="update('×')">× 満席</button>
            </div>
            <button class="modal-btn btn-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
