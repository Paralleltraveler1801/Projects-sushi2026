<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約カレンダー管理 - 鮨処ひし田</title>
  <link rel="stylesheet" href="admin.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ひし田管理">
  <link rel="apple-touch-icon" href="/images/shop01.jpg">
</head>

<body>

    <!-- 管理者ログインオーバーレイ -->
    <div id="login-overlay">
        <div id="login-box">
            <div class="login-logo">鮨処ひし田</div>
            <h2 class="login-title">管理画面</h2>
            <p class="login-sub">パスワードを入力してください</p>
            <input type="password" id="login-password" placeholder="パスワード" autocomplete="current-password">
            <p id="login-error"></p>
            <button id="login-btn">ログイン</button>
        </div>
    </div>

    <!-- ローディングオーバーレイ（通信中に表示） -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- ヘッダー -->
    <header>
        <nav>
            <div class="logo">鮨処ひし田</div>
            <span class="admin-label"></span>
            <div class="admin-tabs">
                <button class="tab-btn active" id="tab-btn-calendar">予約カレンダー管理</button>
                <button class="tab-btn" id="tab-btn-reservations">予約一覧 <span id="demae-badge">新着</span></button>
                <button class="tab-btn" id="admin-refresh-btn">更新</button>
                <button class="tab-btn tab-btn-logout" id="logout-btn">ログアウト</button>
            </div>
        </nav>
    </header>

    <!-- メインコンテンツ -->
    <main class="admin-container">

        <!-- カレンダー管理 -->
        <div id="tab-calendar">

            <!-- ぐるぐる -->
            <div id="calendar-loading">
                <div class="spinner"></div>
            </div>

            <div id="calendar-wrap">
                <div id="month-label" class="month-label"></div>
                <div class="calendar" id="calendar">
                    <div class="day-header">日</div>
                    <div class="day-header">月</div>
                    <div class="day-header">火</div>
                    <div class="day-header">水</div>
                    <div class="day-header">木</div>
                    <div class="day-header">金</div>
                    <div class="day-header">土</div>
                </div>
            </div>

        </div>

        <!-- 予約一覧 -->
        <div id="tab-reservations">
            <div class="reservation-list-header">
                <h2>予約一覧</h2>
                <!-- 来店予約のみ スイッチ -->
                <div id="toggle-kaiten-track" class="toggle-track">
                    <div class="toggle-switch">
                        <div id="toggle-kaiten-bg" class="toggle-bg"></div>
                        <div id="toggle-kaiten-thumb" class="toggle-thumb"></div>
                    </div>
                    <span id="toggle-kaiten-label" class="toggle-label">来店予約のみ</span>
                </div>
                <!-- 出前注文のみ スイッチ -->
                <div id="toggle-demae-only-track" class="toggle-track">
                    <div class="toggle-switch">
                        <div id="toggle-demae-bg" class="toggle-bg"></div>
                        <div id="toggle-demae-thumb" class="toggle-thumb"></div>
                    </div>
                    <span id="toggle-demae-label" class="toggle-label">出前注文のみ</span>
                </div>
                <!-- 今日のみ スイッチ -->
                <div id="toggle-today-track" class="toggle-track">
                    <div class="toggle-switch">
                        <div id="toggle-today-bg" class="toggle-bg"></div>
                        <div id="toggle-today-thumb" class="toggle-thumb"></div>
                    </div>
                    <span id="toggle-today-label" class="toggle-label">今日のみ</span>
                </div>
            </div>
            <div id="reservation-list">読み込み中...</div>
        </div>

    </main>

    <!-- 新着出前通知バナー（トップ帯） -->
    <div id="demae-banner">
        新しい出前注文が入りました ― クリックして確認する
    </div>

    <!-- 新着来店予約通知バナー（トップ帯） -->
    <div id="reservation-banner" onclick="dismissReservationBanner()">
        新しい来店予約が入りました ― クリックして確認する
    </div>

    <!-- 新着出前 全画面アラート -->
    <div id="demae-fullscreen-alert">
        <div class="demae-alert-box">
            <div class="demae-alert-icon"><img src="images/icon/delivery_dining.svg" alt="出前"></div>
            <div class="demae-alert-title">新着出前注文！</div>
            <div class="demae-alert-sub">予約一覧タブを確認してください</div>
            <button class="demae-alert-btn" id="demae-alert-confirm-btn">確認する</button>
        </div>
    </div>

    <!-- 予約編集モーダル -->
    <div id="edit-overlay"></div>
    <div id="edit-modal">
        <div class="edit-modal-box">
            <h3 class="edit-modal-title">予約内容の編集</h3>
            <div id="edit-fields"></div>
            <div class="edit-modal-actions">
                <button id="edit-save-btn">保存</button>
                <button id="edit-close-btn">閉じる</button>
            </div>
        </div>
    </div>

    <!-- ステータス変更モーダル -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 id="modal-date"></h2>
            <p class="modal-sub">予約状況を選択してください</p>
            <div class="modal-buttons">
                <button class="modal-btn btn-○" id="modal-btn-circle">○ 空席あり</button>
                <button class="modal-btn btn-△" id="modal-btn-triangle">△ 残りわずか</button>
                <button class="modal-btn btn-×" id="modal-btn-cross">× 満席</button>
            </div>
            <button class="modal-btn btn-cancel" id="modal-btn-cancel">キャンセル</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
